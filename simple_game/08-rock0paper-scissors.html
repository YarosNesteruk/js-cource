<!DOCTYPE html>

<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="name">Rock Paper Scissors</div>

    <div class="buttons">

        <button onclick="
        play('Rock');
        ">Rock</button>

        <button onclick="
          play('Paper');
        ">Paper</button>

        <button onclick="
        play('Scissors');
        ">Scissors</button>

        <button onclick="
        resetScore();
        "
        >Reset Score</button>

    </div>

    <div class="text"> 
      <a class="link" href="https://supersimple.dev/projects/amazon/orders.html">
        Click here 
      </a>
      to see final version of the project
    </div>

    <script>

      const score = JSON.parse(localStorage.getItem('score'));

      function play(playerMove){
        let result = '';
        const computerMove = computeRandMove();
        
        console.log(`Your move: ${playerMove}`);
        console.log(`Computer move: ${computerMove}`);

        switch(playerMove){
          case 'Rock':
              result = rock(computerMove);
              break;
          case 'Scissors':
              result = scissors(computerMove);
              break;
          case 'Paper': 
              result = paper(computerMove);
              break;
          default: 
            alert('SYSTEM CRASHED');
        }

        setScore(result);

        localStorage.setItem('score', JSON.stringify(score));

        alert(`You picked: ${playerMove}\nComputer: ${computerMove}\nResult: ${result} \n Wins: ${score.wins} Losses: ${score.losses} Ties: ${score.ties}`);
      }

      function paper(computerMove){
        let result = '';
        if(computerMove === 'scissors'){
            result = `You Lost:(`;
          } else if(computerMove === 'paper') {
            result = 'It is a Tie 😲';
          }else{
            result = 'You Won!';
          }
          return result;
      }

      function scissors(computerMove){
        let result = '';
        if(computerMove === 'scissors'){
            result = 'It is a Tie 😲';
        } else if(computerMove === 'paper') {
            result = 'You Won!';
        }else{
            result = `You Lost:(`;
        }
          return result;
      }

      function rock(computerMove){
        let result = '';
        if(computerMove === 'scissors'){
          result = 'You Won!';
        } else if(computerMove === 'paper') {
          result = `You Lost:(`;
        }else{
          result = 'It is a Tie 😲'
        }
          return result;
      }

      function computeRandMove(){
        const randNum = Math.random() ;
        let computerMove = '';

        if(randNum >= 0 && randNum < 1/3){
            computerMove = 'rock';
        }else if(randNum >= 1/3 && randNum < 2/3){
            computerMove = 'paper';
        }else if(randNum >= 2/3 && randNum < 1){
            computerMove = 'scissors';
        }

        return computerMove;
      }

      function setScore(result){
          if(result === 'You Won!'){
              score.wins += 1;
          }else if(result === 'You Lost:('){
              score.losses += 1;
          }else if(result === 'It is a Tie 😲'){
              score.ties += 1;
          }
      }

      function resetScore(){
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
      }
      
    </script>
  </body>

</html>
